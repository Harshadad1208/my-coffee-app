<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen Command Center</title>

<style>

:root{
--bg-dark:#080a0c;
--card-bg:#14171c;
--border-color:rgba(255,255,255,0.08);
--accent-orange:#ff9800;
--accent-blue:#00d2ff;
--accent-green:#00ff88;
--accent-red:#ff3b30;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,system-ui;
}

body{
background:var(--bg-dark);
color:#e0e0e0;
min-height:100vh;
}

/* HEADER */

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 40px;
background:#111;
border-bottom:1px solid var(--border-color);
}

.header h1{
font-size:22px;
background:linear-gradient(to right,#fff,var(--accent-orange));
background-clip:text;
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.logout-btn{
background:transparent;
border:1px solid var(--accent-red);
padding:10px 18px;
color:var(--accent-red);
border-radius:8px;
cursor:pointer;
}

.logout-btn:hover{
background:var(--accent-red);
color:#fff;
}

/* STATS */

.stats{
display:flex;
gap:20px;
padding:30px 40px;
justify-content:center;
flex-wrap:wrap;
}

.stat-card{
background:var(--card-bg);
padding:20px 40px;
border-radius:14px;
text-align:center;
border:1px solid var(--border-color);
}

.stat-card span{
font-size:12px;
color:#888;
}

.stat-card h2{
font-size:34px;
margin-top:5px;
}

/* ANALYTICS */

.analytics{
display:flex;
gap:20px;
justify-content:center;
padding-bottom:30px;
flex-wrap:wrap;
}

.analytics-card{
background:var(--card-bg);
border:1px solid var(--border-color);
padding:20px 35px;
border-radius:14px;
text-align:center;
min-width:180px;
}

.analytics-card span{
font-size:12px;
color:#888;
}

.analytics-card h2{
font-size:26px;
margin-top:5px;
}

/* SECTION TITLES */

.section-title{
padding:20px 40px;
font-size:22px;
font-weight:700;
}

/* ORDERS GRID */

.orders{
padding:0 40px 40px;
display:grid;
grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
gap:20px;
}

/* ORDER CARD */

.order-card{
background:var(--card-bg);
padding:25px;
border-radius:18px;
border:1px solid var(--border-color);
transition:0.3s;
}

.order-card:hover{
transform:translateY(-5px);
}

.order-card h3{
display:flex;
justify-content:space-between;
margin-bottom:10px;
}

.timer{
font-size:13px;
color:#888;
}

.status{
display:inline-block;
padding:5px 12px;
border-radius:8px;
font-size:11px;
font-weight:700;
margin-bottom:10px;
}

.received{background:#0d47a1;color:#fff}
.preparing{background:#ff9800;color:#000}
.ready{background:#00ff88;color:#000}
.delivered{background:#9c27b0;color:#fff}

.delivery-badge{
display:inline-block;
margin:8px 0;
padding:5px 10px;
background:#00ff88;
color:#000;
font-size:11px;
border-radius:6px;
font-weight:700;
}

/* ITEMS */

.items-box{
background:#00000033;
padding:10px;
border-radius:8px;
margin:10px 0;
}

/* CONTROLS */

.controls{
margin-top:15px;
display:flex;
flex-direction:column;
gap:10px;
}

.status-select{
padding:10px;
border-radius:8px;
background:#252a33;
color:#fff;
border:none;
}

.delete-btn{
background:transparent;
border:1px solid #e53935;
color:#e53935;
padding:8px;
border-radius:8px;
cursor:pointer;
}

.delete-btn:hover{
background:#e53935;
color:#fff;
}

.map-btn{
margin-top:8px;
padding:7px 10px;
border:none;
border-radius:6px;
background:#00d2ff;
color:#000;
font-weight:600;
cursor:pointer;
}

/* POPUPS */

.popup{
position:fixed;
top:30px;
right:30px;
background:var(--accent-orange);
color:#000;
padding:15px 25px;
border-radius:10px;
display:none;
font-weight:700;
}

.delete-popup{
background:#e53935;
color:white;
}

/* MOBILE DASHBOARD */

@media(max-width:900px){

.header{
flex-direction:column;
gap:10px;
text-align:center;
}

.orders{
grid-template-columns:1fr;
padding:20px;
}

.section-title{
padding:20px;
}

}

</style>
</head>

<body>

<div class="popup" id="newOrderPopup">
🔥 NEW ORDER RECEIVED!
</div>

<div class="popup delete-popup" id="deletePopup">
❌ Order Deleted Successfully
</div>

<div class="header">
<h1>KITCHEN COMMAND CENTER</h1>
<button class="logout-btn" onclick="logout()">LOGOUT</button>
</div>

<div class="stats">

<div class="stat-card">
<span>Total Orders</span>
<h2 id="orderCount">0</h2>
</div>

<div class="stat-card">
<span>Preparing</span>
<h2 id="preparingCount">0</h2>
</div>

<div class="stat-card">
<span>Ready</span>
<h2 id="readyCount">0</h2>
</div>

</div>

<!-- NEW ANALYTICS SECTION -->

<div class="analytics">

<div class="analytics-card">
<span>Completed Orders</span>
<h2 id="completedCount">0</h2>
</div>

<div class="analytics-card">
<span>Pending Orders</span>
<h2 id="pendingCount">0</h2>
</div>

<div class="analytics-card">
<span>Completion Rate</span>
<h2 id="completionRate">0%</h2>
</div>

</div>

<h2 class="section-title">☕ Cafe Orders</h2>
<div id="cafeOrders" class="orders"></div>

<h2 class="section-title">🚚 Home Delivery Orders</h2>
<div id="deliveryOrders" class="orders"></div>

<audio id="orderSound">
<source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg">
</audio>

<script>

let previousOrders=0;

if(localStorage.getItem("adminLoggedIn")!=="true"){
window.location.href="admin-login.html";
}

function logout(){
localStorage.removeItem("adminLoggedIn");
window.location.href="admin-login.html";
}

function getTimer(orderTime){
let diff=Math.floor((Date.now()-new Date(orderTime))/60000);
return diff+" min";
}

function getStatusEmoji(status){
const emojis={
received:"📩 Received",
preparing:"👨‍🍳 Preparing",
ready:"✅ Ready",
delivered:"📦 Delivered"
};
return emojis[status] || status;
}

function loadOrders(){

fetch("/orders")
.then(res=>res.json())
.then(orders=>{

let cafeContainer=document.getElementById("cafeOrders");
let deliveryContainer=document.getElementById("deliveryOrders");

cafeContainer.innerHTML="";
deliveryContainer.innerHTML="";

document.getElementById("orderCount").innerText=orders.length;

let preparing=0;
let ready=0;
let completed=0;
let pending=0;

if(orders.length>previousOrders){
document.getElementById("orderSound").play();

let popup=document.getElementById("newOrderPopup");
popup.style.display="block";
setTimeout(()=>popup.style.display="none",4000);

}

previousOrders=orders.length;

/* SORT BY TIME */
orders.sort((a,b)=> new Date(a.order_time)-new Date(b.order_time));

let ordersWithSequence=orders.map((order,index)=>{
return {...order,sequence:index+1};
});

ordersWithSequence.reverse();

ordersWithSequence.forEach(order=>{

let targetContainer=
order.order_type==="delivery"
?deliveryContainer
:cafeContainer;

if(order.order_status==="preparing") preparing++;
if(order.order_status==="ready") ready++;

if(order.order_status==="delivered") completed++;
else pending++;

let statusClass=order.order_status;

targetContainer.innerHTML+=`

<div class="order-card">

<h3>
Order #${order.sequence}
<span class="timer">🕒 ${getTimer(order.order_time)}</span>
</h3>

<span class="status ${statusClass}">
${getStatusEmoji(order.order_status)}
</span>

${order.order_type==="delivery"
?`<span class="delivery-badge">🚚 Delivery Order</span>`
:`<span class="delivery-badge">☕ Cafe Order</span>`
}

<p><b>Customer:</b> ${order.customer_name}</p>
<p><b>Phone:</b> ${order.phone}</p>

${order.order_type==="delivery"
?`
<p><b>Address:</b> ${order.address}, ${order.city} - ${order.pincode}</p>

<button class="map-btn"
onclick="openMap('${order.address} ${order.city} ${order.pincode}')">
📍 Open Location
</button>
`
:`
<p><b>Table:</b> ${order.table_number || "N/A"}</p>
`
}

<div class="items-box">
${order.items_list || "No items"}
</div>

<div class="controls">

<select class="status-select"
onchange="updateStatus(${order.order_id},this.value)">

<option value="received" ${order.order_status==="received"?"selected":""}>Received</option>
<option value="preparing" ${order.order_status==="preparing"?"selected":""}>Preparing</option>
<option value="ready" ${order.order_status==="ready"?"selected":""}>Ready</option>
<option value="delivered" ${order.order_status==="delivered"?"selected":""}>Delivered</option>

</select>

<button class="delete-btn"
onclick="deleteOrder(${order.order_id})">
Delete Order
</button>

</div>

</div>
`;

});

/* ANALYTICS UPDATE */

document.getElementById("preparingCount").innerText=preparing;
document.getElementById("readyCount").innerText=ready;

document.getElementById("completedCount").innerText=completed;
document.getElementById("pendingCount").innerText=pending;

let rate=orders.length?Math.round((completed/orders.length)*100):0;
document.getElementById("completionRate").innerText=rate+"%";

});

}

function updateStatus(id,status){

fetch(`/update-status/${id}`,{
method:"PUT",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({status})
})
.then(()=>loadOrders());

}

function deleteOrder(id){

fetch(`/delete-order/${id}`,{method:"DELETE"})
.then(()=>{

loadOrders();

let popup=document.getElementById("deletePopup");

popup.style.display="block";

setTimeout(()=>{
popup.style.display="none";
},3000);

});

}

function openMap(address){

let url=`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
window.open(url,"_blank");

}

function printKitchenReceipt(order){

let win=window.open('','','width=400,height=600');

win.document.write(`
<html>
<head>
<title>Kitchen Receipt</title>
<style>
body{font-family:monospace;padding:20px;}
h2{text-align:center;}
</style>
</head>

<body>

<h2>COFFEE CORNER</h2>
<hr>

<p>Order #${order.sequence}</p>
<p>Customer: ${order.customer_name}</p>

<hr>

<p>${order.items_list}</p>

<hr>

<p>Time: ${new Date(order.order_time).toLocaleTimeString()}</p>

</body>
</html>
`);

win.document.close();
win.print();

}

loadOrders();
setInterval(loadOrders,3000);

</script>

</body>
</html>
