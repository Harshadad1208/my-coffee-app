<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Your Cart - Coffee Corner</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#0f1115;
color:white;
min-height:100vh;
}

/* Animated background */

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(120deg,#ff9800,#ff5722,#ff3d00);
opacity:0.08;
animation:bgmove 10s infinite linear;
z-index:-1;
}

@keyframes bgmove{
0%{transform:translateX(-20%)}
50%{transform:translateX(20%)}
100%{transform:translateX(-20%)}
}

/* NAVBAR */

.nav-links{
display:flex;
justify-content:center;
gap:30px;
padding:16px;
background:#1b1f26;
list-style:none;
border-bottom:1px solid #2a2f38;
}

.nav-links a{
color:white;
text-decoration:none;
font-weight:500;
transition:0.2s;
}

.nav-links a:hover{
color:#ff9800;
}

/* PAGE */

.cart-section{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.cart-section h2{
text-align:center;
font-size:32px;
margin-bottom:30px;
color:#ff9800;
}

/* GRID */

.cart-layout{
display:grid;
grid-template-columns:350px 1fr;
gap:30px;
}

/* CUSTOMER CARD */

.customer-card{
background:#1b1f26;
padding:25px;
border-radius:12px;
border:1px solid #2a2f38;
}

.customer-card h3{
margin-bottom:20px;
color:#ff9800;
}

.customer-card label{
font-size:14px;
margin-top:10px;
display:block;
color:#ccc;
}

.customer-card input{
width:100%;
padding:12px;
margin-top:6px;
margin-bottom:12px;
border-radius:8px;
border:none;
background:#2a2f38;
color:white;
}

.customer-card input:focus{
outline:none;
border:1px solid #ff9800;
}

/* CART CARD */

.cart-card{
background:#1b1f26;
padding:20px;
border-radius:12px;
border:1px solid #2a2f38;
}

/* TABLE */

.cart-table{
width:100%;
border-collapse:collapse;
}

.cart-table th{
background:#ff9800;
color:black;
padding:14px;
}

.cart-table td{
padding:14px;
text-align:center;
border-bottom:1px solid #2a2f38;
}

.cart-table tr:hover{
background:#232832;
}

/* BUTTONS */

.remove-btn{
background:#e53935;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
transition:0.2s;
}

.remove-btn:hover{
background:#c62828;
transform:scale(1.05);
}

/* SUMMARY */

.cart-summary{
margin-top:20px;
text-align:right;
font-size:18px;
}

/* CHECKOUT */

#checkoutBtn{
background:linear-gradient(90deg,#ff9800,#ff5722);
border:none;
padding:14px 28px;
border-radius:8px;
color:white;
font-size:16px;
margin-top:15px;
cursor:pointer;
transition:0.3s;
}

#checkoutBtn:hover{
transform:scale(1.05);
box-shadow:0 10px 25px rgba(0,0,0,0.4);
}

#checkoutBtn:disabled{
background:#666;
cursor:not-allowed;
}

#empty-cart{
text-align:center;
margin-top:20px;
color:#aaa;
}

</style>

</head>

<body>

<ul class="nav-links">
<li><a href="/">Home</a></li>
<li><a href="/bestseller">Bestseller</a></li>
<li><a href="/drinks">Drinks</a></li>
<li><a href="/food">Food</a></li>
<li><a href="/coffee-home">Coffee at Home</a></li>
<li><a href="/ready-to-eat">Ready to Eat</a></li>
</ul>

<section class="cart-section">

<h2>🛒 Your Cart</h2>

<div class="cart-layout">

<!-- CUSTOMER -->

<div class="customer-card">

<h3>Customer Details</h3>

<label>Name</label>
<input type="text" id="customerName" placeholder="Enter your name">

<label>Phone</label>
<input type="tel" id="customerPhone" placeholder="Phone number">

<label>Age</label>
<input type="number" id="customerAge" placeholder="Age">

<label>Table Number</label>
<input type="number" id="tableNumber" placeholder="Table no">

</div>

<!-- CART -->

<div class="cart-card">

<table class="cart-table">

<thead>
<tr>
<th>Item</th>
<th>Price</th>
<th>Qty</th>
<th>Subtotal</th>
<th>Action</th>
</tr>
</thead>

<tbody id="cart-items"></tbody>

</table>

<p id="empty-cart" style="display:none;">Your cart is empty</p>

<div class="cart-summary">

<p><strong>Total: ₹ <span id="cart-total">0.00</span></strong></p>

<button id="checkoutBtn">Proceed to Checkout</button>

</div>

</div>

</div>

</section>

<script>

document.addEventListener("DOMContentLoaded", () => {

const cartItems = document.getElementById("cart-items")
const cartTotal = document.getElementById("cart-total")
const emptyCartMsg = document.getElementById("empty-cart")
const checkoutBtn = document.getElementById("checkoutBtn")

function loadCart(){

fetch("/cart")

.then(res => res.json())

.then(data => {

cartItems.innerHTML=""

if(data.length === 0){

emptyCartMsg.style.display="block"
cartTotal.textContent="0.00"
checkoutBtn.disabled=true
return

}

emptyCartMsg.style.display="none"
checkoutBtn.disabled=false

let total=0

data.forEach(item=>{

let row=document.createElement("tr")

row.innerHTML=`

<td>${item.name}</td>

<td>₹ ${parseFloat(item.price).toFixed(2)}</td>

<td>1</td>

<td>₹ ${parseFloat(item.price).toFixed(2)}</td>

<td>
<button class="remove-btn" onclick="removeItem(${item.id})">
Remove
</button>
</td>

`

cartItems.appendChild(row)

total+=parseFloat(item.price)

})

cartTotal.textContent=total.toFixed(2)

})

}

window.removeItem=function(id){

fetch("/cart/"+id,{
method:"DELETE"
})

.then(()=>loadCart())

}

checkoutBtn.addEventListener("click",()=>{

fetch("/cart")

.then(res=>res.json())

.then(data=>{

if(data.length===0){
alert("Cart is empty")
return
}

let name=document.getElementById("customerName").value.trim()
let phone=document.getElementById("customerPhone").value.trim()
let age=document.getElementById("customerAge").value.trim()
let table=document.getElementById("tableNumber").value.trim()

if(name===""||phone===""||age===""||table===""){
alert("Please fill all details")
return
}

localStorage.setItem("customer_name",name)
localStorage.setItem("customer_phone",phone)
localStorage.setItem("customer_age",age)
localStorage.setItem("table_number",table)

window.location.href="payment.html"

})

})

loadCart()

})

</script>

</body>
</html>
