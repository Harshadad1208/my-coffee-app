<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Your Cart - Coffee Corner</title>
<link rel="stylesheet" href="style.css">

<style>

body{
background:#0f1115;
color:white;
font-family:'Segoe UI',sans-serif;
}

.cart-section{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

.cart-section h2{
text-align:center;
color:#ff9800;
margin-bottom:30px;
}

.cart-card{
background:#1b1f26;
padding:25px;
border-radius:12px;
border:1px solid #2a2f38;
}

.cart-table{
width:100%;
border-collapse:collapse;
}

.cart-table th{
background:#ff9800;
color:black;
padding:12px;
}

.cart-table td{
padding:12px;
text-align:center;
border-bottom:1px solid #2a2f38;
}

.qty-select{
padding:6px;
border-radius:6px;
background:#2a2f38;
color:white;
border:1px solid #444;
}

.remove-btn{
background:#e53935;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

.cart-summary{
margin-top:20px;
text-align:right;
font-size:18px;
}

.order-type{
margin-top:30px;
text-align:center;
}

.order-btn{
background:#2a2f38;
border:1px solid #ff9800;
color:white;
padding:10px 20px;
margin:10px;
border-radius:8px;
cursor:pointer;
}

.order-btn.active{
background:#ff9800;
color:black;
}

#checkoutBtn{
background:linear-gradient(90deg,#ff9800,#ff5722);
border:none;
padding:14px 28px;
border-radius:8px;
color:white;
font-size:16px;
margin-top:15px;
cursor:pointer;
}

#checkoutBtn:disabled{
background:#666;
cursor:not-allowed;
}

#empty-cart{
text-align:center;
margin-top:20px;
color:#aaa;
}

</style>

</head>

<body>

<section class="cart-section">

<h2>🛒 Your Cart</h2>

<div class="cart-card">

<table class="cart-table">

<thead>
<tr>
<th>Item</th>
<th>Price</th>
<th>Qty</th>
<th>Subtotal</th>
<th>Action</th>
</tr>
</thead>

<tbody id="cart-items"></tbody>

</table>

<p id="empty-cart" style="display:none;">Your cart is empty</p>

<div class="cart-summary">
<strong>Total: ₹ <span id="cart-total">0.00</span></strong>
</div>

<div class="order-type">

<h3>Select Order Type</h3>

<button class="order-btn" id="cafeBtn">☕ Cafe Order</button>
<button class="order-btn" id="deliveryBtn">🚚 Home Delivery</button>

<br>

<button id="checkoutBtn" disabled>
Proceed to Checkout
</button>

</div>

</div>

</section>

<script>

let selectedOrderType = ""
let cartHasItems = false

const cartItems = document.getElementById("cart-items")
const cartTotal = document.getElementById("cart-total")
const emptyCartMsg = document.getElementById("empty-cart")
const checkoutBtn = document.getElementById("checkoutBtn")

const cafeBtn = document.getElementById("cafeBtn")
const deliveryBtn = document.getElementById("deliveryBtn")

function loadCart(){

fetch("/cart")
.then(res=>res.json())
.then(data=>{

cartItems.innerHTML=""

if(data.length===0){

cartHasItems=false
emptyCartMsg.style.display="block"
cartTotal.textContent="0.00"
updateCheckoutState()
return

}

cartHasItems=true
emptyCartMsg.style.display="none"

let total=0

data.forEach(item=>{

const row=document.createElement("tr")

row.innerHTML=`
<td>${item.name}</td>

<td>₹ ${Number(item.price).toFixed(2)}</td>

<td>
<select class="qty-select" onchange="updateQty(this,${item.price})">

<option value="1">1</option>
<option value="2">2</option>
<option value="3">3</option>
<option value="4">4</option>
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
<option value="9">9</option>
<option value="10">10</option>

</select>
</td>

<td class="subtotal">₹ ${Number(item.price).toFixed(2)}</td>

<td>
<button class="remove-btn" onclick="removeItem(${item.id})">
Remove
</button>
</td>
`

cartItems.appendChild(row)

total+=Number(item.price)

})

cartTotal.textContent=total.toFixed(2)

updateCheckoutState()

})

}

function updateQty(select,price){

const row = select.closest("tr")
const qty = Number(select.value)

const subtotalCell = row.querySelector(".subtotal")

const subtotal = qty * price

subtotalCell.innerText = "₹ " + subtotal.toFixed(2)

updateTotal()

}

function updateTotal(){

let total = 0

document.querySelectorAll(".subtotal").forEach(cell=>{
total += Number(cell.innerText.replace("₹",""))
})

cartTotal.textContent = total.toFixed(2)

}

function removeItem(id){

fetch("/cart/"+id,{
method:"DELETE"
})
.then(()=>loadCart())

}

cafeBtn.onclick=()=>{

selectedOrderType="cafe"

cafeBtn.classList.add("active")
deliveryBtn.classList.remove("active")

updateCheckoutState()

}

deliveryBtn.onclick=()=>{

selectedOrderType="delivery"

deliveryBtn.classList.add("active")
cafeBtn.classList.remove("active")

updateCheckoutState()

}

function updateCheckoutState(){

if(cartHasItems && selectedOrderType!==""){
checkoutBtn.disabled=false
}else{
checkoutBtn.disabled=true
}

}

checkoutBtn.onclick=()=>{

if(selectedOrderType==="cafe"){
window.location.href="/cafe-checkout"
}

if(selectedOrderType==="delivery"){
window.location.href="/delivery-checkout"
}

}

loadCart()

</script>

</body>
</html>
