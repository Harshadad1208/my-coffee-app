<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coffee Corner Payment</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:#f4f4f4;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* MAIN CARD */

.payment-wrapper{
width:520px;
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 25px 60px rgba(0,0,0,0.15);
}

.payment-wrapper h2{
text-align:center;
margin-bottom:30px;
color:#4e342e;
}

/* PAYMENT METHOD */

.payment-method{
border:1px solid #e5e5e5;
border-radius:10px;
padding:18px;
margin-bottom:16px;
display: flex;
flex-direction: column;
align-items: flex-start; /* Ensures all children align to the left */
}

/* HEADER - Now Left Aligned */

.method-header{
display:flex;
align-items:center;
justify-content: flex-start;
width: 100%;
gap:10px;
font-weight:600;
cursor: pointer;
}

/* FIX: Prevent radio button from stretching */
.method-header input[type="radio"] {
    width: auto;
    margin: 0;
    cursor: pointer;
}

/* INPUTS */

.payment-method select,
.payment-method input[type="text"]{
width:100%;
box-sizing: border-box; /* Prevents input from overflowing */
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ddd;
}

/* CARD FORM */

.card-form{
display:none;
width: 100%;
margin-top:10px;
}

.row{
display:flex;
gap:10px;
}

/* BUTTON */

.pay-btn{
width:100%;
margin-top:20px;
padding:14px;
border:none;
border-radius:8px;
background:linear-gradient(135deg,#ff9800,#ff5722);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.pay-btn:hover{
opacity:0.9;
}

/* SUCCESS NOTIFICATION */

.toast{
position:fixed;
top:20px;
right:20px;
background:#4CAF50;
color:white;
padding:14px 24px;
border-radius:8px;
font-weight:600;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
opacity:0;
transform:translateY(-20px);
transition:all 0.4s ease;
z-index:999;
}

.toast.show{
opacity:1;
transform:translateY(0);
}

</style>
</head>

<body>

<div class="payment-wrapper">

<h2>☕ Payment</h2>

<div class="payment-method">

<label class="method-header">
<input type="radio" name="payment" value="upi" checked>
<span>UPI Payment</span>
</label>

<select>
<option>Google Pay</option>
<option>PhonePe</option>
<option>Paytm</option>
</select>

</div>

<div class="payment-method">

<label class="method-header">
<input type="radio" name="payment" value="card">
<span>Card Payment</span>
</label>

<div class="card-form" id="cardForm">

<input type="text"
placeholder="Card Holder Name"
oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')">

<input type="text"
placeholder="Card Number"
maxlength="16"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<div class="row">

<input type="text"
placeholder="Expiry MMYY"
maxlength="4"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

<input type="text"
placeholder="CVV"
maxlength="3"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">

</div>

</div>

</div>

<div class="payment-method">

<label class="method-header">
<input type="radio" name="payment" value="cash">
<span>Cash Payment</span>
</label>

</div>

<button class="pay-btn" onclick="payNow()">
Confirm Payment
</button>

</div>

<script>

const radios=document.querySelectorAll("input[name='payment']");
const cardForm=document.getElementById("cardForm");

radios.forEach(r=>{

r.addEventListener("change",()=>{

if(r.value==="card" && r.checked){
cardForm.style.display="block";
}
else{
cardForm.style.display="none";
}

});

});

function payNow(){

const toast=document.getElementById("successToast");

toast.classList.add("show");

setTimeout(()=>{
toast.classList.remove("show");
window.location.href="/order-success";
},2000);

}

</script>
<div id="successToast" class="toast">
✅ Payment Successful
</div>
</body>
</html>
