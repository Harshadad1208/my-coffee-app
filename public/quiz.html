<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Coffee Personality Quiz</title>

<style>

body{
font-family:'Segoe UI';
margin:0;
background:#f7f7f7;
overflow-x:hidden;
}

.navbar{
background:#006241;
color:white;
padding:18px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.quiz-container{
max-width:750px;
margin:60px auto;
background:white;
padding:40px;
border-radius:15px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
text-align:center;
position:relative;
}

.progress-bar{
height:10px;
background:#eee;
border-radius:20px;
margin-bottom:35px;
overflow:hidden;
}

.progress{
height:100%;
width:0%;
background:#006241;
transition:0.4s;
}

.question{
font-size:24px;
font-weight:600;
margin-bottom:30px;
}

.option{
display:block;
background:#f3f3f3;
padding:15px;
margin:12px 0;
border-radius:10px;
cursor:pointer;
transition:0.3s;
font-size:16px;
}

.option:hover{
background:#006241;
color:white;
transform:scale(1.03);
}

.fade{
animation:fade 0.4s;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1}
}

.result{
display:none;
}

.personality{
font-size:20px;
color:#555;
margin-bottom:20px;
}

.recommend-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:25px;
}

.recommend-card{
background:white;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
padding:15px;
transition:0.3s;
}

.recommend-card:hover{
transform:translateY(-6px);
}

.recommend-card img{
width:100%;
height:160px;
object-fit:cover;
border-radius:8px;
}

.recommend-card h4{
margin:10px 0;
}

.add-btn{
background:#006241;
color:white;
border:none;
padding:10px 18px;
border-radius:25px;
cursor:pointer;
}

.add-btn:hover{
background:#004d33;
}

.bean{
position:fixed;
font-size:20px;
opacity:0.1;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-100vh)}
}

</style>
</head>

<body>

<div class="navbar">
☕ Discover Your Coffee Personality
</div>

<div class="quiz-container">

<div class="progress-bar">
<div class="progress" id="progress"></div>
</div>

<div id="quizBox">

<div class="question fade" id="question"></div>

<div id="options"></div>

</div>

<div class="result" id="result">

<h2>Your Coffee Personality</h2>

<div class="personality" id="personality"></div>

<h3>Recommended For You</h3>

<div class="recommend-grid" id="recommendGrid"></div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

let sweet=0,strong=0,cold=0,snack=0

let current=0

const quiz=[

{
q:"How do you like your coffee?",
a:[
{text:"Sweet & creamy",type:"sweet"},
{text:"Strong and bold",type:"strong"},
{text:"Cold & refreshing",type:"cold"},
{text:"Coffee with snacks",type:"snack"}
]
},

{
q:"Pick your favorite flavor",
a:[
{text:"Chocolate",type:"sweet"},
{text:"Dark roast",type:"strong"},
{text:"Vanilla",type:"cold"},
{text:"Savory",type:"snack"}
]
},

{
q:"Best time for coffee?",
a:[
{text:"Dessert time",type:"sweet"},
{text:"Morning energy",type:"strong"},
{text:"Afternoon chill",type:"cold"},
{text:"Lunch combo",type:"snack"}
]
},

{
q:"Pick a café vibe",
a:[
{text:"Indulgent treat",type:"sweet"},
{text:"Power boost",type:"strong"},
{text:"Cool refreshment",type:"cold"},
{text:"Comfort meal",type:"snack"}
]
},

{
q:"Your typical order?",
a:[
{text:"Frappuccino",type:"sweet"},
{text:"Americano",type:"strong"},
{text:"Iced latte",type:"cold"},
{text:"Sandwich",type:"snack"}
]
},

{
q:"Pick a treat",
a:[
{text:"Chocolate drink",type:"sweet"},
{text:"Espresso shot",type:"strong"},
{text:"Cold brew",type:"cold"},
{text:"Panini sandwich",type:"snack"}
]
}

]

function loadQuestion(){

let q=quiz[current]

document.getElementById("question").innerText=q.q

let html=""

q.a.forEach(o=>{
html+=`<div class="option fade" onclick="answer('${o.type}')">${o.text}</div>`
})

document.getElementById("options").innerHTML=html

document.getElementById("progress").style.width=((current/quiz.length)*100)+"%"

}

function answer(type){

if(type=="sweet") sweet++
if(type=="strong") strong++
if(type=="cold") cold++
if(type=="snack") snack++

current++

if(current<quiz.length){
loadQuestion()
}else{
showResult()
}

}

function showResult(){

document.getElementById("quizBox").style.display="none"

document.getElementById("result").style.display="block"

document.getElementById("progress").style.width="100%"

let max=Math.max(sweet,strong,cold,snack)

let personality=""
let items=[]

if(max==sweet){

personality="🍫 The Sweet Coffee Explorer"

items=[
{name:"Double Chocolate Chip Frappuccino",img:"images/double-choco-frappuccino.jpg"},
{name:"Java Chip Frappuccino",img:"images/java-chip-frappuccino.jpg"},
{name:"Pink Drink",img:"images/pink-drink.jpg"}
]

}

else if(max==strong){

personality="🔥 The Bold Espresso Lover"

items=[
{name:"Cappuccino",img:"images/cappuccino.jpg"},
{name:"Caffe Americano",img:"images/caffe-americano.jpg"},
{name:"Italian Roast 150g",img:"images/italian-roast.jpg"}
]

}

else if(max==cold){

personality="❄️ The Chill Coffee Fan"

items=[
{name:"Cold Coffee",img:"images/cold-coffee.jpg"},
{name:"Classic Iced Coffee",img:"images/classic-iced-coffee.jpg"},
{name:"Iced Vienna Creamy Latte",img:"images/iced-vienna-latte.jpg"}
]

}

else{

personality="🥪 The Food Companion"

items=[
{name:"Avocado Panini Sandwich",img:"images/avocado-panini.jpg"},
{name:"Chicken Ham Croissant Sandwich",img:"images/chicken-ham-croissant.jpg"},
{name:"Pepper Chicken Bahn Mi",img:"images/pepper-chicken-bahnmi.jpg"}
]

}

document.getElementById("personality").innerText=personality

let grid=""

items.forEach(item=>{

grid+=`
<div class="recommend-card">
<img src="${item.img}">
<h4>${item.name}</h4>
<button class="add-btn" onclick="goMenu()">Order</button>
</div>
`

})

document.getElementById("recommendGrid").innerHTML=grid

confetti()

}

function goMenu(){
window.location.href="full-menu.html"
}

loadQuestion()

for(let i=0;i<15;i++){
let bean=document.createElement("div")
bean.className="bean"
bean.innerHTML="☕"
bean.style.left=Math.random()*100+"%"
bean.style.animationDuration=(5+Math.random()*10)+"s"
document.body.appendChild(bean)
}

</script>

</body>
</html>
