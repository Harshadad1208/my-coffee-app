<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<title>Delivery Checkout - Coffee Corner</title>

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#fff7f0,#ffe6cc,#fff2e6);
}

/* NAVBAR */

.nav-links{
display:flex;
justify-content:center;
gap:25px;
padding:15px;
background:#3e2723;
list-style:none;
margin:0;
}

.nav-links a{
color:white;
text-decoration:none;
font-weight:bold;
}

.nav-links a:hover{
color:#ffcc80;
}

/* MAIN */

.checkout-section{
max-width:900px;
margin:auto;
padding:40px 20px;
}

/* CARD */

.checkout-card{
background:white;
padding:35px;
border-radius:16px;
box-shadow:0 15px 40px rgba(0,0,0,0.15);
}

.checkout-card h2{
text-align:center;
color:#4e342e;
margin-bottom:25px;
}

/* FORM GRID */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.full{
grid-column:span 2;
}

label{
font-weight:600;
display:block;
margin-bottom:6px;
color:#555;
}

input,textarea{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

textarea{
resize:none;
height:90px;
}

input:focus, textarea:focus{
outline:none;
border-color:#ff9800;
box-shadow:0 0 6px rgba(255,152,0,0.4);
}

/* SUMMARY */

.summary{
margin-top:30px;
padding-top:20px;
border-top:1px solid #ddd;
text-align:right;
font-size:18px;
color:#4e342e;
}

/* BUTTON */

.place-order{
margin-top:25px;
width:100%;
padding:15px;
font-size:16px;
background:linear-gradient(135deg,#ff9800,#ff5722);
border:none;
border-radius:10px;
color:white;
font-weight:bold;
cursor:pointer;
}

.place-order:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<ul class="nav-links">
<li><a href="/">Home</a></li>
<li><a href="/bestseller">Bestseller</a></li>
<li><a href="/drinks">Drinks</a></li>
<li><a href="/food">Food</a></li>
</ul>

<section class="checkout-section">

<div class="checkout-card">

<h2>🚚 Delivery Details</h2>

<div class="form-grid">

<div>
<label>Full Name</label>
<input type="text" id="name" placeholder="Enter your full name"
oninput="this.value=this.value.replace(/[^A-Za-z ]/g,'')">
</div>

<div>
<label>Phone Number</label>
<input type="tel"
id="phone"
maxlength="10"
placeholder="Enter phone number"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">
</div>

<div class="full">
<label>Delivery Address</label>
<textarea id="address" placeholder="House No, Street, Area"></textarea>
</div>

<div>
<label>State</label>
<input list="states" id="state" placeholder="Search or select state">

<datalist id="states">
<option>Andhra Pradesh</option>
<option>Arunachal Pradesh</option>
<option>Assam</option>
<option>Bihar</option>
<option>Chhattisgarh</option>
<option>Goa</option>
<option>Gujarat</option>
<option>Haryana</option>
<option>Himachal Pradesh</option>
<option>Jharkhand</option>
<option>Karnataka</option>
<option>Kerala</option>
<option>Madhya Pradesh</option>
<option>Maharashtra</option>
<option>Manipur</option>
<option>Meghalaya</option>
<option>Mizoram</option>
<option>Nagaland</option>
<option>Odisha</option>
<option>Punjab</option>
<option>Rajasthan</option>
<option>Sikkim</option>
<option>Tamil Nadu</option>
<option>Telangana</option>
<option>Tripura</option>
<option>Uttar Pradesh</option>
<option>Uttarakhand</option>
<option>West Bengal</option>
</datalist>

</div>

<div>
<label>City</label>
<input list="cities" id="city" placeholder="Search or select city">

<datalist id="cities">
<option>Mumbai</option>
<option>Pune</option>
<option>Delhi</option>
<option>Bangalore</option>
<option>Hyderabad</option>
<option>Chennai</option>
<option>Kolkata</option>
<option>Ahmedabad</option>
<option>Jaipur</option>
<option>Nagpur</option>
<option>Lucknow</option>
<option>Indore</option>
<option>Surat</option>
<option>Bhopal</option>
<option>Patna</option>
</datalist>

</div>

<div class="full">
<label>Pin Code</label>
<input type="text"
id="pincode"
maxlength="6"
placeholder="Enter 6 digit pin code"
oninput="this.value=this.value.replace(/[^0-9]/g,'')">
</div>

</div>

<div class="summary">

<p><strong>Total Amount: ₹ <span id="totalAmount">0</span></strong></p>

<button class="place-order" id="placeOrderBtn">
Proceed to Payment
</button>

</div>

</div>

</section>

<script>

function loadCartTotal(){

fetch("/cart")
.then(res=>res.json())
.then(data=>{

let total=0

data.forEach(item=>{
total += parseFloat(item.price)
})

document.getElementById("totalAmount").innerText = total.toFixed(2)

})

}

document.getElementById("placeOrderBtn").addEventListener("click",()=>{

let name=document.getElementById("name").value.trim()
let phone=document.getElementById("phone").value.trim()
let address=document.getElementById("address").value.trim()
let state=document.getElementById("state").value.trim()
let city=document.getElementById("city").value.trim()
let pincode=document.getElementById("pincode").value.trim()

if(name==="" || phone==="" || address==="" || state==="" || city==="" || pincode===""){
alert("Please fill complete delivery details")
return
}

if(phone.length!==10){
alert("Phone number must be exactly 10 digits")
return
}

if(pincode.length!==6){
alert("Pin code must be exactly 6 digits")
return
}

fetch("/place-order",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

customer_name:name,
phone:phone,
address:address,
city:city,
pincode:pincode,
order_type:"delivery"

})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

window.location.href="/delivery-payment"

}

else{
alert("Order failed. Please try again.")
}

})

})

loadCartTotal()

</script>

</body>
</html>
