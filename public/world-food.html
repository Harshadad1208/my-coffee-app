<!DOCTYPE html>
<html>
<head>
<title>World Foods</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.card img{
width:100%;
border-radius:8px;
}

</style>
</head>

<body>

<h1>🌍 Famous Foods Around The World</h1>

<div class="grid">

<div class="card">
<img src="images/pizza.jpg">
<h3>Italy</h3>
<p>Pizza & Pasta</p>
</div>

<div class="card">
<img src="images/croissant.jpg">
<h3>France</h3>
<p>Croissant</p>
</div>

<div class="card">
<img src="images/bratwurst.jpg">
<h3>Germany</h3>
<p>Bratwurst Sausage</p>
</div>

</div>

</body>
</html>
